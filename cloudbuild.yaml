steps:
  # ── BUILD ALL THREE IMAGES IN PARALLEL ──────────────────────────────────────

  # Build the C++ matcher image
  - id: 'build-matcher'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aegis-matcher', './services/matcher']
    waitFor: ['-']

  # Build the Backend image
  - id: 'build-backend'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aegis-backend', './services/backend']
    waitFor: ['-']

  # Build the Frontend image (NEXT_PUBLIC_* vars baked in at build time)
  - id: 'build-frontend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aegis-frontend'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_CLIENT_ID=$_NEXT_PUBLIC_GOOGLE_CLIENT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY'
      - './services/frontend'
    waitFor: ['-']

  # ── PUSH ALL THREE IMAGES IN PARALLEL ───────────────────────────────────────

  - id: 'push-matcher'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aegis-matcher']
    waitFor: ['build-matcher']

  - id: 'push-backend'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aegis-backend']
    waitFor: ['build-backend']

  - id: 'push-frontend'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aegis-frontend']
    waitFor: ['build-frontend']

  # ── DEPLOY TO CLOUD RUN (after pushes) ──────────────────────────────────────

  - id: 'deploy-matcher'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aegis-matcher'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aegis-matcher'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
    waitFor: ['push-matcher']

  - id: 'deploy-backend'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aegis-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aegis-backend'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '$_CLOUDSQL_INSTANCE'
      - '--set-secrets'
      - 'DATABASE_URL=$_DATABASE_URL_SECRET:latest,GEMINI_API_KEY=$_GEMINI_API_KEY_SECRET:latest'
      - '--set-env-vars'
      - 'MATCHER_URL=$_MATCHER_URL,GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FRONTEND_URL=$_FRONTEND_URL,DOCUMENT_AI_PROCESSOR_ID=$_DOCUMENT_AI_PROCESSOR_ID'
    waitFor: ['push-backend']

  - id: 'deploy-frontend'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aegis-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aegis-frontend'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL,NEXT_PUBLIC_GOOGLE_CLIENT_ID=$_NEXT_PUBLIC_GOOGLE_CLIENT_ID,NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY'
    waitFor: ['push-frontend']

  # ── HEALTH CHECK — verify backend is up after deploy ────────────────────────
  - id: 'health-check'
    name: 'gcr.io/cloud-builders/curl'
    args:
      - '-f'
      - 'https://aegis-backend-75btxxix5a-uc.a.run.app/health'
    waitFor: ['deploy-backend', 'deploy-frontend', 'deploy-matcher']

images:
  - 'gcr.io/$PROJECT_ID/aegis-matcher'
  - 'gcr.io/$PROJECT_ID/aegis-backend'
  - 'gcr.io/$PROJECT_ID/aegis-frontend'

# ── SUBSTITUTION DEFAULTS (override in Cloud Build trigger settings) ──────────
# Set these in the Cloud Build trigger UI — NEVER hardcode secrets here.
substitutions:
  _REGION: 'us-central1'
  _CLOUDSQL_INSTANCE: 'YOUR_PROJECT:us-central1:YOUR_INSTANCE'
  _DATABASE_URL_SECRET: 'DATABASE_URL'
  _GEMINI_API_KEY_SECRET: 'GEMINI_API_KEY'
  _DOCUMENT_AI_PROCESSOR_ID: 'your-document-ai-processor-id'
  _GOOGLE_CLIENT_ID: 'your-oauth-client-id.apps.googleusercontent.com'
  _FRONTEND_URL: 'https://aegis-frontend-75btxxix5a-uc.a.run.app'
  _MATCHER_URL: 'https://aegis-matcher-xxxxx-uc.a.run.app'
  _NEXT_PUBLIC_API_URL: 'https://aegis-backend-xxxxx-uc.a.run.app'
  _NEXT_PUBLIC_GOOGLE_CLIENT_ID: 'your-oauth-client-id.apps.googleusercontent.com'
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: 'your-maps-api-key'
