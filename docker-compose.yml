version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: aegis_db
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: aegisnexus
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aegis_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegisnexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  cpp_matcher:
    build:
      context: ./services/matcher
      dockerfile: Dockerfile
    container_name: aegis_matcher
    ports:
      - "8080:8080"
    networks:
      - aegis_net
    restart: on-failure

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: aegis_backend
    environment:
      - DATABASE_URL=postgresql://aegis:password123@db:5432/aegisnexus
      - MATCHER_URL=http://cpp_matcher:8080
      - PORT=3001
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      cpp_matcher:
        condition: service_started
    networks:
      - aegis_net

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: aegis_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aegis_net

volumes:
  db_data:

networks:
  aegis_net:
    driver: bridge
